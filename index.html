<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deezer-Manager</title>
    <!-- LLAMADA AL ARCHIVO DE ESTILOS GLOBAL -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syne:wght@700;800&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="Styles/styles.css">
</head>
<body class="theme-light"> <!-- Clase modificable para modo oscuro/claro (Programador 1) -->

    <!-- ======================================================================
         1. SECCIÓN DE AUTENTICACIÓN (Trabajo del Programador 1)
         ====================================================================== -->
    <section id="auth-section">

        <div id="landing-hero">
            <div class="hero-overlay"></div> <!-- Capa oscura para dar la vibra misteriosa -->
            
            <div class="hero-content">
                <h1 class="hero-title">Sincroniza<br><span>Dimensión Musical</span></h1>
                <p class="hero-subtitle">Gestiona, califica y domina tu biblioteca de Deezer de una forma totalmente diferente.</p>
                <!-- BOTÓN CRÍTICO PARA IR AL LOGIN -->
                <button id="btn-comenzar" class="btn-primary">Empezar ahora</button>
            </div>
        </div>

      
        <!-- FORMULARIO DE ACCESO Y REGISTRO (ESTILO TERMINAL) -->
        <div id="login-container" class="hidden">
            
            <!-- LIENZO PARA LA LLUVIA DIGITAL DE MATRIX -->
            <canvas id="matrix-canvas"></canvas>

            <div class="terminal-card">
                
                <!-- HEADER DE LA TARJETA (COMPARTIDO) -->
                <header class="terminal-header">
                    <span class="status-blink">●</span> SUBJECT ACCESS TERMINAL
                    <span id="terminal-subtitle" class="system-id">MODE: AUTH_LOGIN</span>
                </header>

                <!-- SECCIÓN SUPERIOR: 2 IMÁGENES ORIGINALES (COMPARTIDAS) -->
                <div class="terminal-grid-top">
                    <div class="image-box profile-img">
                        <img src="https://images.unsplash.com/photo-1570158268183-d296b2892211?q=80&w=500" alt="Subject Face">
                    </div>
                    <div class="image-box data-graphics">
                        <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=500" alt="System Diagnostics">
                    </div>
                </div>

                <!-- SECCIÓN MEDIA: CONTENEDOR DUAL (LOGIN / REGISTRO) -->
                <div class="terminal-body-layout">
                    
                    <!-- COLUMNA IZQUIERDA: 2 IMÁGENES LATERALES (COMPARTIDAS) -->
                    <div class="terminal-sidebar-images">
                        <div class="image-box sidebar-img-1">
                            <img src="https://images.unsplash.com/photo-1558494949-ef010cbdcc31?q=80&w=500" alt="Biometrics">
                        </div>
                        <div class="image-box sidebar-img-2">
                            <img src="https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?q=80&w=500" alt="Audio Waveform">
                        </div>
                    </div>

                    <!-- COLUMNA DERECHA - FORMULARIO 1: LOGIN -->
                    <form id="form-login" class="terminal-form">
                        <div class="input-group">
                            <label for="login-user">OPERATIVE_USER:</label>
                            <input type="text" id="login-user" required placeholder="Introduce tu usuario..." autocomplete="off">
                        </div>
                        
                        <div class="input-group">
                            <label for="login-pass">ACCESS_CODE:</label>
                            <input type="password" id="login-pass" required placeholder="••••••••">
                        </div>

                        <!-- INDICADOR DE CARGA -->
                        <div id="auth-spinner" class="spinner-container hidden">
                            <div class="cyber-spinner"></div>
                            <p>VALIDATING CREDENTIALS...</p>
                        </div>

                        <button type="submit" id="btn-submit-login" class="btn-terminal">ACCESS SYSTEM</button>
                    </form>

                    <!-- COLUMNA DERECHA - FORMULARIO 2: REGISTRO (OCULTO POR DEFECTO) -->
                    <form id="form-register" class="terminal-form hidden">
                        <div class="input-group">
                            <label for="reg-user">NEW_OPERATIVE_USER:</label>
                            <input type="text" id="reg-user" required placeholder="Crea tu alias de agente..." autocomplete="off">
                        </div>
                        
                        <div class="input-group">
                            <label for="reg-pass">CREATE_ACCESS_CODE:</label>
                            <input type="password" id="reg-pass" required placeholder="Mínimo 6 caracteres">
                        </div>

                        <div class="input-group">
                            <label for="reg-pass-confirm">CONFIRM_ACCESS_CODE:</label>
                            <input type="password" id="reg-pass-confirm" required placeholder="Repite tu contraseña">
                        </div>

                        <!-- INDICADOR DE CARGA DE REGISTRO -->
                        <div id="reg-spinner" class="spinner-container hidden">
                            <div class="cyber-spinner"></div>
                            <p>CREATING PROFILE DIRECTORY...</p>
                        </div>

                        <button type="submit" id="btn-submit-register" class="btn-terminal">INITIALIZE PROFILE</button>
                    </form>
                    
                </div>

                <!-- FOOTER DE LA TARJETA (DINÁMICO CON JS) -->
                <footer class="terminal-footer">
                    <p class="music-taste-tag">// MUSIC_TASTE: COMPROMISED</p>
                    
                    <!-- Enlace para ir a Registro -->
                    <button type="button" id="btn-go-register" class="link-terminal">Initialize New Profile [Register]</button>
                    
                    <!-- Enlace para regresar a Login (Oculto por defecto) -->
                    <button type="button" id="btn-go-login" class="link-terminal hidden">Return to Access Terminal [Login]</button>
                </footer>

            </div>
        </div>

    </section>


   <!-- ======================================================================
         2. INTERFAZ PRINCIPAL DEL SISTEMA (DASHBOARD SPA)
         ====================================================================== -->
    <section id="app-layout" class="hidden">
        
        <!-- BARRA LATERAL (Trabajo del Programador 1) -->
        <aside id="sidebar">
            <div class="sidebar-wrapper">
                
                <!-- Perfil del Operativo Logueado -->
                <div class="user-profile-panel">
                    <div class="user-avatar-status"></div>
                    <div class="user-info">
                        <span class="user-tag">OPERATIVE_ACTIVE</span>
                        <p id="display-username">USER_UNKNOWN</p>
                    </div>
                </div>

                <!-- Menú de Navegación SPA -->
                <nav class="sidebar-nav">
                    <button id="btn-nav-search" class="nav-link active">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg> 
                        SEARCH_MUSIC
                    </button>
                    <button id="btn-nav-library" class="nav-link">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                        </svg>
                         MY_LIBRARY
                    </button>
                </nav>

                <!-- Controles del Sistema (Tema y Logout) -->
                <div class="sidebar-footer">
                    <!-- Interruptor de Tema (Inicia en Modo Oscuro, muestra Luna) -->
                    <button id="btn-toggle-theme" class="btn-system-toggle">
                        <span id="theme-icon-container">
                            <!-- SVG de la Luna -->
                            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                            </svg>
                        </span>
                        <span id="theme-text">SWITCH_LIGHT_MODE</span>
                    </button>
                    
                    <!-- Botón de Salida Segura -->
                    <button id="btn-logout" class="btn-system-logout">
                        <!-- SVG de Apagar / Salir -->
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
                            <line x1="12" y1="2" x2="12" y2="12"></line>
                        </svg>
                        SHUTDOWN_SESSION
                    </button>
                </div>

            </div>
        </aside>

        <!-- CONTENEDOR DE CONTENIDO PRINCIPAL (Donde se clonan las plantillas) -->
        <main id="main-content">
            <!-- Aquí el orquestador inyectará el Buscador (Dev 2) o la Biblioteca (Dev 3) -->
        </main>

    </section>


    <!-- ======================================================================
         3. PLANTILLAS DINÁMICAS (No se muestran hasta que JS las clona)
         ====================================================================== -->

    <!-- PLANTILLA DEL BUSCADOR (Trabajo del Programador 2) -->
    <template id="temp-buscador">
        <section id="search-view">
            <!-- 
                [PROGRAMADOR 2] Aquí va tu HTML para el buscador:
                - Input para buscar artista y botón[cite: 2].
                - Sección para el "Top 10 populares" (Linkin Park y otros)[cite: 2].
                - Panel dinámico para pintar el Detalle del Artista (Álbumes y Tracks)[cite: 3].
                - Estado vacío con SVG carita triste si no hay resultados[cite: 2].
            -->
            <div class="search-wrapper">
                <!-- Tu código HTML de búsqueda va aquí -->
            </div>
        </section>
    </template>

    <!-- PLANTILLA DE LA BIBLIOTECA (Trabajo del Programador 3) -->
    <template id="temp-biblioteca">
        <section id="library-view">
            <!-- 
                [PROGRAMADOR 3] Aquí va tu HTML para la colección privada[cite: 3]:
                - Listado de álbumes favoritos guardados[cite: 3].
                - Filtros dinámicos por cantidad de estrellas (1-5)[cite: 3].
                - Sistema de calificación visual por estrellas en cada tarjeta de álbum[cite: 3].
            -->
            <div class="library-wrapper">
                <!-- Tu código HTML de favoritos va aquí -->
            </div>
        </section>
    </template>


    <!-- ======================================================================
         4. CONTROLADOR PRINCIPAL (Cargado como Módulo)
         ====================================================================== -->
    <script type="module" src="app.js"></script>

</body>
</html>
